name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Nuxt build
        uses: actions/cache@v4
        with:
          path: |
            .nuxt
            .output
            node_modules/.cache
          key: nuxt-build-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'server/**', 'nuxt.config.ts') }}
          restore-keys: |
            nuxt-build-${{ hashFiles('pnpm-lock.yaml') }}-
            nuxt-build-

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # All secrets from the app's Doppler spoke project (prd config) are resolved —
      # including cross-project hub references — and injected into $GITHUB_ENV.
      # This makes CLOUDFLARE_API_TOKEN, NUXT_* keys, etc. available to Build & Deploy.
      - name: Fetch Doppler Secrets
        run: doppler secrets download --no-file --format docker >> $GITHUB_ENV
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build and Deploy
        run: |
          pnpm build
          pnpm exec wrangler deploy
